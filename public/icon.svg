<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#059669"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <!-- Three stacked bars = the three-tier write contract (canon / heuristic / reflex). -->
  <!-- Top: canon — short, dense, fully opaque -->
  <rect x="16" y="17" width="22" height="6" rx="2" fill="#f8fafc"/>
  <!-- Middle: heuristic — wider, semi-transparent -->
  <rect x="16" y="27" width="30" height="6" rx="2" fill="#f8fafc" fill-opacity="0.6"/>
  <!-- Bottom: reflex — widest, faintest -->
  <rect x="16" y="37" width="26" height="6" rx="2" fill="#f8fafc" fill-opacity="0.3"/>
</svg>
